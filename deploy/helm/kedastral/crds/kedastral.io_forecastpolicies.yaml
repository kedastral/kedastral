---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: forecastpolicies.kedastral.io
spec:
  group: kedastral.io
  names:
    kind: ForecastPolicy
    listKind: ForecastPolicyList
    plural: forecastpolicies
    shortNames:
    - fp
    singular: forecastpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.scaleTargetRef.name
      name: Target
      type: string
    - jsonPath: .spec.model.type
      name: Model
      type: string
    - jsonPath: .status.currentReplicas
      name: Current
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ForecastPolicy describes a workload to forecast and scale predictively.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ForecastPolicySpec defines the desired forecasting and scaling
              behavior for a workload.
            properties:
              capacity:
                description: CapacitySpec configures the capacity planner that converts
                  forecasts to replicas.
                properties:
                  downMaxPercentPerStep:
                    default: 50
                    description: DownMaxPercentPerStep limits scale-down per forecast
                      step (0-100).
                    type: integer
                  headroom:
                    default: 1.2
                    description: Headroom is a safety multiplier applied when quantiles
                      are unavailable.
                    type: number
                  maxReplicas:
                    default: 100
                    type: integer
                  minReplicas:
                    default: 1
                    type: integer
                  quantileLevel:
                    default: "0"
                    description: QuantileLevel selects quantile-based planning (e.g.
                      p90, p95, or 0.90). "0" disables it.
                    type: string
                  targetPerPod:
                    description: TargetPerPod is the target metric value handled by
                      a single pod.
                    type: number
                  upMaxFactorPerStep:
                    default: 2
                    description: UpMaxFactorPerStep limits scale-up per forecast step.
                    type: number
                required:
                - targetPerPod
                type: object
              dataSourceRef:
                description: DataSourceRef references the DataSource to collect metrics
                  from.
                properties:
                  name:
                    description: Name of the referenced DataSource.
                    type: string
                required:
                - name
                type: object
              forecast:
                description: |-
                  ForecastSpec controls the forecast horizon and cadence. Durations use Go format
                  extended with d (days) and w (weeks): e.g. 30s, 5m, 1h, 7d, 1w.
                properties:
                  horizon:
                    default: 30m
                    type: string
                  interval:
                    default: 30s
                    type: string
                  step:
                    default: 1m
                    type: string
                  window:
                    default: 30m
                    type: string
                type: object
              leadTime:
                default: 10m
                description: |-
                  LeadTime is how far ahead the scaler looks for proactive scale-up.
                  Passed to the generated ScaledObject trigger metadata.
                type: string
              metric:
                description: Metric is the metric name used in logs and snapshots.
                type: string
              model:
                description: ModelSpec selects and configures the forecasting model.
                properties:
                  arima:
                    description: ARIMAParams configures the ARIMA model. Zero values
                      request automatic selection.
                    properties:
                      d:
                        type: integer
                      p:
                        type: integer
                      q:
                        type: integer
                    type: object
                  byomURL:
                    description: BYOMURL is the bring-your-own-model service URL.
                      Required when type is byom.
                    type: string
                  sarima:
                    description: SARIMAParams configures the seasonal ARIMA model.
                    properties:
                      d:
                        type: integer
                      p:
                        type: integer
                      q:
                        type: integer
                      seasonalD:
                        type: integer
                      seasonalP:
                        type: integer
                      seasonalPeriod:
                        description: SeasonalPeriod is the seasonal cycle length (e.g.
                          24 for hourly with a daily pattern).
                        type: integer
                      seasonalQ:
                        type: integer
                    type: object
                  type:
                    default: baseline
                    description: 'Type is the forecasting model: baseline, arima,
                      sarima, or byom.'
                    enum:
                    - baseline
                    - arima
                    - sarima
                    - byom
                    type: string
                required:
                - type
                type: object
              scaleTargetRef:
                description: ScaleTargetRef is the workload scaled by the generated
                  ScaledObject.
                properties:
                  apiVersion:
                    default: apps/v1
                    description: APIVersion of the scale target. Defaults to apps/v1.
                    type: string
                  kind:
                    default: Deployment
                    description: Kind of the scale target. Defaults to Deployment.
                    type: string
                  name:
                    description: Name of the scale target.
                    type: string
                required:
                - name
                type: object
            required:
            - capacity
            - dataSourceRef
            - metric
            - scaleTargetRef
            type: object
          status:
            description: ForecastPolicyStatus reports the observed state of a ForecastPolicy.
            properties:
              conditions:
                description: Conditions represent the latest observations of the policy
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentReplicas:
                description: CurrentReplicas is the most recently planned replica
                  count.
                type: integer
              desiredReplicas:
                description: DesiredReplicas is the peak planned replica count over
                  the forecast horizon.
                type: integer
              lastForecastTime:
                description: LastForecastTime is when the most recent forecast snapshot
                  was generated.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation last processed by
                  the controller.
                format: int64
                type: integer
              scaledObjectName:
                description: ScaledObjectName is the name of the generated KEDA ScaledObject.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
