{{- if .Values.mcpServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kedastral.mcpServer.serviceName" . }}
  labels:
    {{- include "kedastral.mcpServer.labels" . | nindent 4 }}
  {{- with .Values.mcpServer.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcpServer.service.type }}
  ports:
  - port: {{ .Values.mcpServer.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "kedastral.mcpServer.selectorLabels" . | nindent 4 }}
{{- end }}
